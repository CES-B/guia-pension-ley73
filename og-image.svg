  <path d="M655,220 Q720,180 780,160 Q840,155 890,175 Q910,200 895,230" fill="none" stroke="#f0d060" stroke-width="1.5" opacity="0.4"/>

  <!-- CUERPO principal -->
  <ellipse cx="600" cy="255" rx="68" ry="90" fill="#c9a030" filter="url(#shadow)"/>
  <!-- Sombra cuerpo -->
  <ellipse cx="608" cy="265" rx="55" ry="75" fill="#a07820" opacity="0.4"/>
  <!-- Plumas pecho -->
  <path d="M560,220 Q580,215 600,218 Q620,215 640,220 Q630,240 600,245 Q570,240 560,220 Z" fill="#d4aa40"/>
  <path d="M558,245 Q578,238 600,242 Q622,238 642,245 Q632,265 600,270 Q568,265 558,245 Z" fill="#c9a030"/>
  <path d="M560,270 Q580,263 600,267 Q620,263 640,270 Q630,290 600,295 Q570,290 560,270 Z" fill="#b89028"/>
  <path d="M564,295 Q582,288 600,292 Q618,288 636,295 Q628,312 600,316 Q572,312 564,295 Z" fill="#a87820"/>

  <!-- CUELLO -->
  <path d="M572,175 Q585,165 600,162 Q615,165 628,175 Q622,195 600,198 Q578,195 572,175 Z" fill="#c9a030"/>

  <!-- CABEZA detallada -->
  <ellipse cx="600" cy="148" rx="42" ry="38" fill="#d4aa40" filter="url(#shadow)"/>

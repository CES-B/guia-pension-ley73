  <path d="M420,160 Q380,172 340,188 Q310,202 305,228" fill="none" stroke="#8a6010" stroke-width="2" opacity="0.5"/>
  <path d="M460,165 Q430,182 405,205 Q385,228 382,255" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.4"/>
  <path d="M500,170 Q475,192 458,220 Q444,248 445,272" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.4"/>
  <!-- Borde ala izq luminoso -->
  <path d="M545,220 Q480,180 420,160 Q360,155 310,175 Q290,200 305,230" fill="none" stroke="#f0d060" stroke-width="1.5" opacity="0.4"/>

  <!-- ALA DERECHA - capa base -->
  <path d="M655,220 Q720,180 780,160 Q840,155 890,175 Q910,200 895,230 Q860,220 820,225 Q780,235 740,250 Q700,265 665,280 Z" fill="#b8902a" filter="url(#shadow)"/>
  <!-- Plumas primarias der -->
  <path d="M665,280 Q710,300 760,330 Q800,355 830,385 Q810,375 780,355 Q750,340 720,325 Q690,312 662,300 Z" fill="#c9a030"/>
  <path d="M665,285 Q715,310 770,345 Q805,368 840,400 Q818,388 785,365 Q752,346 724,330 Q693,316 664,305 Z" fill="#b08020"/>

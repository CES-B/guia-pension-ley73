<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005a3c"/>
      <stop offset="50%" style="stop-color:#003d28"/>
      <stop offset="100%" style="stop-color:#001f14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a07820"/>
      <stop offset="50%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#a07820"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#8a6510"/>
    </linearGradient>
    <linearGradient id="feather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a030"/>
      <stop offset="100%" style="stop-color:#7a5010"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo principal -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Textura sutil de fondo -->
  <rect width="1200" height="630" fill="url(#glow)" opacity="0.4"/>

  <!-- Franjas de la bandera -->
  <rect x="0" y="0" width="22" height="630" fill="#006847"/>
  <rect x="22" y="0" width="22" height="630" fill="#ffffff" opacity="0.9"/>
  <rect x="44" y="0" width="22" height="630" fill="#ce1126"/>
  <rect x="1134" y="0" width="22" height="630" fill="#006847"/>
  <rect x="1156" y="0" width="22" height="630" fill="#ffffff" opacity="0.9"/>
  <rect x="1178" y="0" width="22" height="630" fill="#ce1126"/>

  <!-- Círculos decorativos de fondo -->
  <circle cx="600" cy="200" r="260" fill="url(#glow)" opacity="0.6"/>
  <circle cx="600" cy="200" r="200" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
  <circle cx="600" cy="200" r="240" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1"/>

  <!-- ===== ÁGUILA DETALLADA ===== -->


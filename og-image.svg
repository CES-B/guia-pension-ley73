  <path d="M583,114 Q583,96 587,85" fill="none" stroke="#b08020" stroke-width="2"/>
  <path d="M617,114 Q617,96 613,85" fill="none" stroke="#b08020" stroke-width="2"/>

  <!-- OJO izquierdo (visible) -->
  <circle cx="614" cy="143" r="11" fill="#1a0f00"/>
  <circle cx="614" cy="143" r="8" fill="#2a1500"/>
  <circle cx="614" cy="143" r="5" fill="#0a0500"/>
  <circle cx="616" cy="141" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="617" cy="141" r="1" fill="white"/>
  <!-- Ceja/línea ojo -->
  <path d="M604,136 Q614,133 622,136" fill="none" stroke="#8a6010" stroke-width="2.5" stroke-linecap="round"/>

  <!-- PICO detallado -->
  <path d="M598,158 Q614,162 628,172 Q622,182 612,185 Q604,184 598,178 Z" fill="#d4960a"/>
  <path d="M598,158 Q614,162 628,172" fill="none" stroke="#a06800" stroke-width="1.5"/>
  <path d="M600,172 Q608,174 616,176" fill="none" stroke="#a06800" stroke-width="1" opacity="0.6"/>
  <!-- Fosa nasal -->
  <ellipse cx="614" cy="165" rx="4" ry="2.5" fill="#a06800" opacity="0.6"/>

  <!-- ESCUDO en el pecho -->
  <ellipse cx="600" cy="268" rx="30" ry="35" fill="#004a31" opacity="0.85"/>
  <ellipse cx="600" cy="268" rx="26" ry="31" fill="#005a3c" opacity="0.7"/>
  <!-- Número 73 en escudo -->
  <text x="600" y="278" text-anchor="middle" font-size="26" fill="#f0d060" font-family="Georgia, serif" font-weight="bold" filter="url(#glow-filter)">73</text>

  <!-- PATAS -->
  <path d="M578,330 Q574,345 570,360" stroke="#b08020" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M622,330 Q626,345 630,360" stroke="#b08020" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Garras izquierda -->
  <path d="M570,360 Q550,372 540,382" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M570,360 Q558,375 555,388" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M570,360 Q568,378 570,390" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M570,360 Q576,376 580,388" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Garras derecha -->
  <path d="M630,360 Q650,372 660,382" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M630,360 Q642,375 645,388" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M630,360 Q632,378 630,390" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M630,360 Q624,376 620,388" stroke="#9a7010" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- SERPIENTE en pico (detalle mexicano) -->
  <path d="M620,172 Q640,165 655,170 Q668,176 670,188 Q660,196 648,192 Q636,188 628,182" fill="none" stroke="#2d6e2d" stroke-width="5" stroke-linecap="round"/>
  <path d="M668,190 Q674,196 672,202 Q668,206 664,202" fill="#2d6e2d"/>

  <!-- ===== LÍNEAS DECORATIVAS ===== -->
  <rect x="80" y="448" width="1040" height="3" rx="1.5" fill="url(#gold)" opacity="0.8"/>
  <rect x="80" y="455" width="1040" height="1" rx="0.5" fill="url(#gold)" opacity="0.3"/>

  <!-- ===== TEXTOS ===== -->
  <!-- Título principal -->
  <text x="600" y="498" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="900" fill="white" filter="url(#shadow)">Guía de Pensión</text>
  <!-- Subtítulo dorado -->
  <text x="600" y="554" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="900" fill="url(#gold)" filter="url(#shadow)">"Ley 73" del IMSS</text>
  <!-- Frase motivacional -->
  <text x="600" y="592" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="rgba(255,255,255,0.65)">Tu retiro digno está en tus manos — conócelo y exígelo</text>
  <!-- Autor -->
  <text x="600" y="618" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="rgba(201,168,76,0.85)">por Carlos Serrano · México 2026</text>

  <!-- Estrellas decorativas esquinas -->
  <text x="100" y="50" font-size="18" fill="#c9a84c" opacity="0.4">✦</text>
  <text x="1080" y="50" font-size="18" fill="#c9a84c" opacity="0.4">✦</text>
  <text x="100" y="610" font-size="18" fill="#c9a84c" opacity="0.4">✦</text>
  <text x="1080" y="610" font-size="18" fill="#c9a84c" opacity="0.4">✦</text>
</svg>

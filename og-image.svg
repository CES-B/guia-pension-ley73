  <path d="M560,340 Q540,380 520,420 Q540,410 560,390 Q570,420 565,450 Q585,430 585,400 Q590,430 592,455 Q605,430 600,400 Q610,430 615,455 Q620,430 615,400 Q625,420 635,450 Q630,420 635,390 Q655,410 660,420 Q645,380 640,340 Z" fill="url(#feather)" filter="url(#shadow)"/>
  <!-- Detalles cola -->
  <path d="M560,340 Q542,378 524,416" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>
  <path d="M575,345 Q568,388 567,446" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>
  <path d="M592,347 Q592,390 592,450" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>
  <path d="M608,347 Q610,390 614,450" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>
  <path d="M624,345 Q630,388 632,446" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>
  <path d="M640,340 Q655,378 674,416" fill="none" stroke="#8a6010" stroke-width="1.5" opacity="0.7"/>

